<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXEL TYPE</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

  #webcam {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(1) brightness(0.85);
    transform: scaleX(-1);
    z-index: 0;
  }

  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding-bottom: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
    pointer-events: none;
  }

  #input {
    pointer-events: all;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.22);
    color: #fff;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.55em;
    text-align: center;
    width: 520px;
    max-width: 90vw;
    padding: 12px 0;
    outline: none;
    text-transform: uppercase;
    transition: border-color 0.25s ease;
    caret-color: rgba(255,255,255,0.6);
    font-size: 14px;
  }

  #input::placeholder {
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.55em;
  }

  #input:focus {
    border-bottom-color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>

<div id="ui">
  <input id="input" type="text" placeholder="TYPE SOMETHING" maxlength="80"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.163.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.163.0/examples/jsm/",
  "@mediapipe/tasks-vision":"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

// ── PIXEL FONT 5×7 ────────────────────────────────────────────────────────────
// 7 rows, each row is a 5-bit number — bit 4 = leftmost pixel, bit 0 = rightmost
const FONT = {
  ' ': [0,0,0,0,0,0,0],
  'A': [0b01110,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
  'B': [0b11110,0b10001,0b10001,0b11110,0b10001,0b10001,0b11110],
  'C': [0b01110,0b10001,0b10000,0b10000,0b10000,0b10001,0b01110],
  'D': [0b11100,0b10010,0b10001,0b10001,0b10001,0b10010,0b11100],
  'E': [0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b11111],
  'F': [0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b10000],
  'G': [0b01110,0b10001,0b10000,0b10111,0b10001,0b10001,0b01111],
  'H': [0b10001,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
  'I': [0b01110,0b00100,0b00100,0b00100,0b00100,0b00100,0b01110],
  'J': [0b00111,0b00010,0b00010,0b00010,0b10010,0b10010,0b01100],
  'K': [0b10001,0b10010,0b10100,0b11000,0b10100,0b10010,0b10001],
  'L': [0b10000,0b10000,0b10000,0b10000,0b10000,0b10000,0b11111],
  'M': [0b10001,0b11011,0b10101,0b10001,0b10001,0b10001,0b10001],
  'N': [0b10001,0b11001,0b10101,0b10011,0b10001,0b10001,0b10001],
  'O': [0b01110,0b10001,0b10001,0b10001,0b10001,0b10001,0b01110],
  'P': [0b11110,0b10001,0b10001,0b11110,0b10000,0b10000,0b10000],
  'Q': [0b01110,0b10001,0b10001,0b10001,0b10101,0b10010,0b01101],
  'R': [0b11110,0b10001,0b10001,0b11110,0b10100,0b10010,0b10001],
  'S': [0b01110,0b10001,0b10000,0b01110,0b00001,0b00001,0b01110],
  'T': [0b11111,0b00100,0b00100,0b00100,0b00100,0b00100,0b00100],
  'U': [0b10001,0b10001,0b10001,0b10001,0b10001,0b10001,0b01110],
  'V': [0b10001,0b10001,0b10001,0b10001,0b01010,0b01010,0b00100],
  'W': [0b10001,0b10001,0b10101,0b10101,0b10101,0b11011,0b10001],
  'X': [0b10001,0b10001,0b01010,0b00100,0b01010,0b10001,0b10001],
  'Y': [0b10001,0b10001,0b01010,0b00100,0b00100,0b00100,0b00100],
  'Z': [0b11111,0b00001,0b00010,0b00100,0b01000,0b10000,0b11111],
  '0': [0b01110,0b10001,0b10011,0b10101,0b11001,0b10001,0b01110],
  '1': [0b00100,0b01100,0b00100,0b00100,0b00100,0b00100,0b01110],
  '2': [0b01110,0b10001,0b00001,0b00110,0b01000,0b10000,0b11111],
  '3': [0b01110,0b00001,0b00001,0b01110,0b00001,0b00001,0b01110],
  '4': [0b00010,0b00110,0b01010,0b10010,0b11111,0b00010,0b00010],
  '5': [0b11111,0b10000,0b10000,0b11110,0b00001,0b00001,0b11110],
  '6': [0b01110,0b10000,0b10000,0b11110,0b10001,0b10001,0b01110],
  '7': [0b11111,0b00001,0b00010,0b00100,0b01000,0b01000,0b01000],
  '8': [0b01110,0b10001,0b10001,0b01110,0b10001,0b10001,0b01110],
  '9': [0b01110,0b10001,0b10001,0b01111,0b00001,0b10001,0b01110],
  '!': [0b00100,0b00100,0b00100,0b00100,0b00100,0b00000,0b00100],
  '?': [0b01110,0b10001,0b00001,0b00010,0b00100,0b00000,0b00100],
  '.': [0b00000,0b00000,0b00000,0b00000,0b00000,0b00000,0b00100],
  ',': [0b00000,0b00000,0b00000,0b00000,0b00110,0b00100,0b01000],
  '-': [0b00000,0b00000,0b00000,0b11111,0b00000,0b00000,0b00000],
  '+': [0b00000,0b00100,0b00100,0b11111,0b00100,0b00100,0b00000],
  '/': [0b00001,0b00001,0b00010,0b00100,0b01000,0b10000,0b10000],
  '(': [0b00010,0b00100,0b01000,0b01000,0b01000,0b00100,0b00010],
  ')': [0b01000,0b00100,0b00010,0b00010,0b00010,0b00100,0b01000],
  '#': [0b01010,0b01010,0b11111,0b01010,0b11111,0b01010,0b01010],
  '@': [0b01110,0b10001,0b10111,0b10101,0b10110,0b10000,0b01111],
};

// ── RENDERER ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// ── SCENE / CAMERA ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);

// ── LIGHTING ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 2.5));

// ── SHARED RESOURCES ──────────────────────────────────────────────────────────
const VOXEL_GEO = new THREE.BoxGeometry(0.82, 0.82, 0.82);

// Palette: white, black, red, blue — one shared material per color
const PALETTE = [0x1144ee, 0xeecc00, 0xdd1111].map(color =>
  new THREE.MeshPhongMaterial({ color, specular: 0x111111, shininess: 60, flatShading: true })
);

// Fixed face colors: right, left, top, bottom, front, back
// BoxGeometry face order: +x, -x, +y, -y, +z, -z
const FACE_MATS = [
  PALETTE[2], // right  (+x) — red
  PALETTE[2], // left   (-x) — red
  PALETTE[1], // top    (+y) — yellow
  PALETTE[1], // bottom (-y) — yellow
  PALETTE[0], // front  (+z) — blue
  PALETTE[0], // back   (-z) — blue
];

// Build a single merged geometry of box-bar edges along all 12 cube edges
function buildEdgeGeo(size, t) {
  const h = size / 2;
  const specs = [
    // 4 edges along X
    { geo: new THREE.BoxGeometry(size, t, t), pos: [ 0, -h, -h] },
    { geo: new THREE.BoxGeometry(size, t, t), pos: [ 0,  h, -h] },
    { geo: new THREE.BoxGeometry(size, t, t), pos: [ 0, -h,  h] },
    { geo: new THREE.BoxGeometry(size, t, t), pos: [ 0,  h,  h] },
    // 4 edges along Y
    { geo: new THREE.BoxGeometry(t, size, t), pos: [-h,  0, -h] },
    { geo: new THREE.BoxGeometry(t, size, t), pos: [ h,  0, -h] },
    { geo: new THREE.BoxGeometry(t, size, t), pos: [-h,  0,  h] },
    { geo: new THREE.BoxGeometry(t, size, t), pos: [ h,  0,  h] },
    // 4 edges along Z
    { geo: new THREE.BoxGeometry(t, t, size), pos: [-h, -h,  0] },
    { geo: new THREE.BoxGeometry(t, t, size), pos: [ h, -h,  0] },
    { geo: new THREE.BoxGeometry(t, t, size), pos: [-h,  h,  0] },
    { geo: new THREE.BoxGeometry(t, t, size), pos: [ h,  h,  0] },
  ];
  const geos = specs.map(({ geo, pos }) => { geo.translate(...pos); return geo; });
  const merged = mergeGeometries(geos);
  geos.forEach(g => g.dispose());
  return merged;
}

const EDGE_GEO = buildEdgeGeo(0.82, 0.08);
const WIRE_MAT = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });

// ── STATE ─────────────────────────────────────────────────────────────────────
const textGroup = new THREE.Group();
scene.add(textGroup);

let cubes = [];
let dying = []; // cubes animating out
let camTargetZ = 22;
let camCurrentZ = 22;
let orbitAngle = 0;

// ── ROTATION VELOCITY (inertia system) ────────────────────────────────────────
const AUTO_ROT = { x: 0.008, y: 0.013, z: 0.004 };
const rotVel = { x: AUTO_ROT.x, y: AUTO_ROT.y, z: AUTO_ROT.z };

// ── HAND TRACKING STATE ───────────────────────────────────────────────────────
let handLandmarker = null;
let handPresent = false;
let prevWristX = null;
let lastVideoTime = -1;
const video = document.getElementById('webcam');

// Fist → open-hand gesture state
let explodingCubes = [];
let wasFist = false;
let fistFrames = 0;
let explodeCooldown = 0;

const CHAR_W = 5;
const CHAR_H = 7;
const CHAR_GAP = 1;
const LINE_GAP = 2;
const MAX_LINE = 10; // chars per line before wrapping

// ── WORD WRAP ─────────────────────────────────────────────────────────────────
function getLines(str) {
  const words = str.split(' ');
  const lines = [];
  let cur = '';

  for (const word of words) {
    if (!word) continue;
    if (cur.length === 0) {
      if (word.length >= MAX_LINE) {
        for (let i = 0; i < word.length; i += MAX_LINE) lines.push(word.slice(i, i + MAX_LINE));
      } else {
        cur = word;
      }
    } else {
      const joined = cur + ' ' + word;
      if (joined.length <= MAX_LINE) {
        cur = joined;
      } else {
        lines.push(cur);
        if (word.length >= MAX_LINE) {
          for (let i = 0; i < word.length; i += MAX_LINE) lines.push(word.slice(i, i + MAX_LINE));
          cur = '';
        } else {
          cur = word;
        }
      }
    }
  }
  if (cur.length > 0) lines.push(cur);
  return lines.filter(l => l.length > 0);
}

// ── BUILD TEXT ────────────────────────────────────────────────────────────────
function buildText(text) {
  const now = performance.now();

  // Send current cubes to die — they shrink out while still rotating
  for (const c of cubes) {
    c.userData.dyingStart = now;
    c.userData.dyingFrom = c.scale.x;
    dying.push(c);
  }
  cubes = [];

  const str = text.trim().toUpperCase();
  if (!str.length) { camTargetZ = 22; return; }

  const lines = getLines(str);
  const maxLineW = Math.max(...lines.map(l => l.length * (CHAR_W + CHAR_GAP) - CHAR_GAP));
  const totalH = lines.length * CHAR_H + (lines.length - 1) * LINE_GAP;

  // Vertical center of the whole text block
  const blockTop = (totalH - 1) / 2;

  lines.forEach((line, li) => {
    const lineW = line.length * (CHAR_W + CHAR_GAP) - CHAR_GAP;
    const ox = -(lineW - 1) / 2; // center each line independently
    const oy = blockTop - li * (CHAR_H + LINE_GAP);

    [...line].forEach((ch, ci) => {
      const bitmap = FONT[ch] ?? FONT[' '];
      const bx = ci * (CHAR_W + CHAR_GAP);
      // Stagger by character — small delay so all chars arrive quickly
      const charOrder = li * MAX_LINE + ci;
      const delay = charOrder * 6;

      for (let row = 0; row < CHAR_H; row++) {
        const bits = bitmap[row];
        for (let col = 0; col < CHAR_W; col++) {
          if (!((bits >> (CHAR_W - 1 - col)) & 1)) continue;

          const group = new THREE.Group();
          group.position.set(ox + bx + col, oy - row, 0);
          group.userData = { born: now, delay };
          group.scale.setScalar(0.001);
          group.add(new THREE.Mesh(VOXEL_GEO, FACE_MATS));
          group.add(new THREE.Mesh(EDGE_GEO, WIRE_MAT));

          textGroup.add(group);
          cubes.push(group);
        }
      }
    });
  });

  // Fit camera to full text block
  const fovR = camera.fov * Math.PI / 220;
  const asp = camera.aspect;
  const zW = (maxLineW / 2 + 0.5) / (Math.tan(fovR / 2) * asp);
  const zH = (totalH / 2 + 0.5) / Math.tan(fovR / 2);
  camTargetZ = Math.max(zW, zH) * 1.05;
}

// ── GESTURE HELPERS ───────────────────────────────────────────────────────────
function dist3D(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0);
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}

// Count how many of the 4 fingers (not thumb) are extended
function countExtendedFingers(lm) {
  // [tip, pip] landmark pairs for index, middle, ring, pinky
  return [[8,6],[12,10],[16,14],[20,18]]
    .filter(([tip, pip]) => dist3D(lm[tip], lm[0]) > dist3D(lm[pip], lm[0]))
    .length;
}

function triggerExplosion() {
  for (const c of cubes) {
    const angle = Math.random() * Math.PI * 2;
    const elev  = (Math.random() - 0.25) * Math.PI * 0.9; // slight upward bias
    const speed = 0.35 + Math.random() * 0.45;
    c.userData.vx = Math.cos(angle) * Math.cos(elev) * speed;
    c.userData.vy = Math.sin(elev) * speed;
    c.userData.vz = (Math.random() - 0.5) * speed * 0.6;
    c.userData.explosionStart = performance.now();
    explodingCubes.push(c);
  }
  cubes = [];
  dying = []; // cancel any pending die-out
  document.getElementById('input').value = '';
  camTargetZ = 22;
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  // ── Hand detection ──────────────────────────────────────────────────────────
  if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const results = handLandmarker.detectForVideo(video, now);
    if (results.landmarks.length > 0) {
      const lm = results.landmarks[0];
      const wristX = lm[0].x;

      // ── Swipe rotation ────────────────────────────────────────────────────
      if (handPresent && prevWristX !== null) {
        const dx = -(wristX - prevWristX);
        if (Math.abs(dx) > 0.022) {
          rotVel.y += dx * 14;
          rotVel.y = Math.max(-0.25, Math.min(0.25, rotVel.y));
        }
      }
      handPresent = true;
      prevWristX = wristX;

      // ── Fist → open-hand gesture ─────────────────────────────────────────
      if (now >= explodeCooldown) {
        const extended = countExtendedFingers(lm);
        if (extended <= 2) {
          // Accumulate fist frames — require ~0.2 s hold to register
          fistFrames = Math.min(fistFrames + 1, 20);
          if (fistFrames >= 6) wasFist = true;
        } else {
          if (extended >= 4 && wasFist) {
            triggerExplosion();
            explodeCooldown = now + 2500;
          }
          wasFist = false;
          fistFrames = 0;
        }
      }
    } else {
      handPresent = false;
      prevWristX = null;
      wasFist = false;
      fistFrames = 0;
    }
  }

  // ── Velocity update ─────────────────────────────────────────────────────────
  if (handPresent) {
    // Inertia: decay toward 0 while hand is controlling
    rotVel.x *= 0.985;
    rotVel.y *= 0.985;
    rotVel.z *= 0.985;
  } else {
    // Gradually restore auto-rotation
    rotVel.x += (AUTO_ROT.x - rotVel.x) * 0.012;
    rotVel.y += (AUTO_ROT.y - rotVel.y) * 0.012;
    rotVel.z += (AUTO_ROT.z - rotVel.z) * 0.012;
  }

  // ── Exploding cubes: fly outward, spin fast, fade ───────────────────────────
  explodingCubes = explodingCubes.filter(c => {
    const age = (now - c.userData.explosionStart) / 1000; // seconds
    c.position.x += c.userData.vx;
    c.position.y += c.userData.vy;
    c.position.z += c.userData.vz;
    c.userData.vy -= 0.014; // gravity
    c.rotation.x += 0.11;
    c.rotation.y += 0.09;
    c.rotation.z += 0.07;
    const s = Math.max(0, 1 - age * 0.75);
    c.scale.setScalar(s);
    if (s <= 0) { textGroup.remove(c); return false; }
    return true;
  });

  // Dying cubes: shrink to 0 over 160ms
  dying = dying.filter(c => {
    const t = Math.min((now - c.userData.dyingStart) / 160, 1);
    c.scale.setScalar(c.userData.dyingFrom * (1 - t * t));
    c.rotation.x += rotVel.x;
    c.rotation.y += rotVel.y;
    c.rotation.z += rotVel.z;
    if (t >= 1) { textGroup.remove(c); return false; }
    return true;
  });

  // Active cubes: scale in with cubic ease-out over 200ms
  for (const cube of cubes) {
    const { born, delay } = cube.userData;
    const age = now - born - delay;
    if (age < 0) continue;

    if (cube.scale.x < 1) {
      const t = Math.min(age / 200, 1);
      cube.scale.setScalar(1 - Math.pow(1 - t, 3));
    }

    cube.rotation.x += rotVel.x;
    cube.rotation.y += rotVel.y;
    cube.rotation.z += rotVel.z;
  }

  // Smooth camera zoom
  camCurrentZ += (camTargetZ - camCurrentZ) * 0.05;

  // Gentle camera sway to reveal 3D depth
  orbitAngle += 0.0028;
  const sway = Math.sin(orbitAngle) * camCurrentZ * 0.07;
  camera.position.set(sway, 1.8, camCurrentZ);
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// ── INPUT ─────────────────────────────────────────────────────────────────────
const input = document.getElementById('input');
input.addEventListener('input', () => buildText(input.value));
input.focus();

// Redirect all keypresses to the input regardless of focus
window.addEventListener('keydown', (e) => {
  if (document.activeElement === input) return; // already focused — native handling
  if (e.metaKey || e.ctrlKey || e.altKey) return; // don't intercept shortcuts
  e.preventDefault();
  input.focus();
  if (e.key === 'Backspace') {
    input.value = input.value.slice(0, -1);
  } else if (e.key.length === 1) {
    if (input.value.length < parseInt(input.maxLength)) input.value += e.key;
  }
  input.dispatchEvent(new Event('input'));
});

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── WEBCAM + MEDIAPIPE ────────────────────────────────────────────────────────
async function init() {
  // Start webcam
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
  } catch (e) {
    console.warn('Webcam unavailable:', e);
  }

  // Load MediaPipe HandLandmarker
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 1,
    });
  } catch (e) {
    console.warn('MediaPipe init failed:', e);
  }
}
init();
</script>
</body>
</html>
