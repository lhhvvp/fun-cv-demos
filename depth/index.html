<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Hand Tracking Template</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Workbench&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; padding: 0; margin: 0; font-family: "Workbench" }
    body { background: #f0f0f0; color: #333; overflow: hidden; }
    #container { display: flex; width: 100vw; height: 100vh; }
    
    /* Left Panel: Darker to contrast video */
    #left-panel { width: 50vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; position: relative; border-right: 4px solid #fff; }
    
    /* Right Panel: Bright and clean */
    #right-panel { width: 50vw; height: 100vh; position: relative; background: #f0f0f0; }
    
    #video { display: none; }
    #output-canvas { width: 100%; height: 100%; object-fit: cover; }
    
    .text-box {
        font-weight: bold;
        background: rgba(255, 255, 255, 0.6);
        border: 0px solid #fff;
        /* font-style: italic; */
        font-size: 24px;
        color: #0000ff;
        z-index: 100;  line-height: 1.4; pointer-events: none;
        padding: 10px;
        backdrop-filter: blur(10px);
    }
    #info { position: absolute; }
    #fps { position: absolute; top: 10px; right: 10px;  z-index: 100; }
  </style>

  <!-- IMPORT MAP -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="container">
    <div id="left-panel">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="output-canvas"></canvas>
    </div>
    <div id="right-panel">
      <canvas id="threejs-canvas"></canvas>
    </div>
  </div>
  <div id="info" class="text-box" style="display: none;">
    X: <span id="hand-x">---</span><br>
    Y: <span id="hand-y">---</span><br>
    Z: <span id="hand-z">---</span>
  </div>
  <div id="fps" class="text-box" >FPS: <span id="fps-value">--</span></div>

  <!-- MediaPipe Global Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <script type="module">
    import * as THREE from 'three';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // --- CONFIGURATION ---
    const video = document.getElementById('video');
    const outputCanvas = document.getElementById('output-canvas');
    const outputCtx = outputCanvas.getContext('2d');
    const infoDiv = document.getElementById('info');
    const handXSpan = document.getElementById('hand-x');
    const handYSpan = document.getElementById('hand-y');
    const handZSpan = document.getElementById('hand-z');
    const fpsValueSpan = document.getElementById('fps-value');

    let smoothedX = 0;
    let smoothedY = 2;
    let smoothedZ = 0;
    const smoothFactor = 0.35; // Smooth movement for heavy glass object
    let targetPos = { x: 0, y: 2, z: 0, hasData: false };

    // FPS tracking
    let lastFrameTime = performance.now();
    let frameCount = 0;
    let fps = 0;

    // --- SCENE SETUP ---
    const rightPanel = document.getElementById('right-panel');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0); // Bright Light Grey Room
    // Add subtle fog to blend floor into background
    scene.fog = new THREE.Fog(0xff0000, 30, 100);

    const camera = new THREE.PerspectiveCamera(60, rightPanel.clientWidth / rightPanel.clientHeight, 0.1, 1000);
    camera.position.set(0, 5, 14);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ 
      canvas: document.getElementById('threejs-canvas'), 
      antialias: true,
      alpha: false 
    });
    renderer.setSize(rightPanel.clientWidth, rightPanel.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    // Environment for reflections
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

    // --- LIGHTING (Overhead & Bright) ---
    const ambientLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.0);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 12.0);
    sunLight.position.set(0, 20, 5); // Overhead
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 50;
    // Widen shadow camera to cover floor
    const d = 20;
    sunLight.shadow.camera.left = -d;
    sunLight.shadow.camera.right = d;
    sunLight.shadow.camera.top = d;
    sunLight.shadow.camera.bottom = -d;
    sunLight.shadow.bias = -0.001;
    sunLight.shadow.normalBias = 0.02;
    sunLight.shadow.radius = 2;
    scene.add(sunLight);

    // --- ROOM / FLOOR ---
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ 
      color: 0xffffff, // White floor
      roughness: 0.8, 
      metalness: 0.0 
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -6; 
    floor.receiveShadow = true;
    scene.add(floor);

    // --- BACK WALL ---
    const backWallGeo = new THREE.PlaneGeometry(200, 200);
    const backWallMat = new THREE.MeshStandardMaterial({ 
      color: 0xffffff, // White wall
      roughness: 0.8, 
      metalness: 0.0 
    });
    const backWall = new THREE.Mesh(backWallGeo, backWallMat);
    backWall.position.z = camera.position.z - 100; // 100 units behind camera
    backWall.receiveShadow = true;
    scene.add(backWall);

    // --- CREATE GLASS ARTIFACT ---
    function createGlassCube(size, thickness) {
      const group = new THREE.Group();
      const r = size / 2;
      
      // 1. The Frame Material (Clean White Matte)
      const frameMaterial = new THREE.MeshStandardMaterial({
        color: 0xffddff,
        roughness: 0.4,
        metalness: 0.9
      });

      // 2. The Glass Material (Pastel Teal, Transparent)
      const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0x0000ff,       // Pastel Teal / Mint
        metalness: 0.1,
        roughness: 0.00,       // Smooth
        transmission: 1.0,    // See-through (Glass)
        thickness: 0.5,        // Refraction volume
        ior: 3.5,              // Index of Refraction (Glass)
        clearcoat: 1.0,
        side: THREE.DoubleSide,
        transparent: true,
      });

      // Helper for frame edges
      const createEdge = (p1, p2) => {
        const dist = p1.distanceTo(p2);
        const cylinder = new THREE.CylinderGeometry(thickness, thickness, dist, 16);
        const mesh = new THREE.Mesh(cylinder, frameMaterial);
        mesh.position.copy(p1).add(p2).multiplyScalar(0.5);
        mesh.lookAt(p2);
        mesh.rotateX(Math.PI / 2);
        mesh.castShadow = true;
        return mesh;
      };

      const createCorner = (pos) => {
        const sphere = new THREE.SphereGeometry(thickness * 1.5, 32, 32);
        const mesh = new THREE.Mesh(sphere, frameMaterial);
        mesh.position.copy(pos);
        mesh.castShadow = true;
        return mesh;
      };

      const corners = [
        new THREE.Vector3(-r, -r, -r), new THREE.Vector3(r, -r, -r),
        new THREE.Vector3(r, r, -r),   new THREE.Vector3(-r, r, -r),
        new THREE.Vector3(-r, -r, r),  new THREE.Vector3(r, -r, r),
        new THREE.Vector3(r, r, r),    new THREE.Vector3(-r, r, r)
      ];

      corners.forEach(pos => group.add(createCorner(pos)));

      const edges = [
        [0,1], [1,2], [2,3], [3,0], 
        [4,5], [5,6], [6,7], [7,4], 
        [0,4], [1,5], [2,6], [3,7]  
      ];
      edges.forEach(pair => group.add(createEdge(corners[pair[0]], corners[pair[1]])));

      // 3. The Inner Glass Fill (Box)
      // Slightly smaller than frame to prevent z-fighting
      const innerSize = size - (thickness * 1.5); 
      const glassBox = new THREE.Mesh(
        new THREE.BoxGeometry(innerSize, innerSize, innerSize),
        glassMaterial
      );
      glassBox.castShadow = true; // Glass casting shadows (caustics approximation)
      glassBox.receiveShadow = true;
      group.add(glassBox);

      return group;
    }

    const arObject = createGlassCube(5.5, 0.1);
    scene.add(arObject);

    window.addEventListener('resize', () => {
      camera.aspect = rightPanel.clientWidth / rightPanel.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(rightPanel.clientWidth, rightPanel.clientHeight);
    });

    // --- HAND TRACKING LOGIC ---
    const hands = new window.Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      outputCanvas.width = results.image.width;
      outputCanvas.height = results.image.height;
      outputCtx.save();
      outputCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
      outputCtx.translate(outputCanvas.width, 0);
      outputCtx.scale(-1, 1);
      outputCtx.drawImage(results.image, 0, 0, outputCanvas.width, outputCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        const middleMCP = landmarks[9];
        const dx = wrist.x - middleMCP.x;
        const dy = wrist.y - middleMCP.y;
        const handSize = Math.sqrt(dx*dx + dy*dy); 
        
        // Z mapping
        const rawZ = -((1 / handSize) * 1.5) + 8; 
        
        const targetX = -(wrist.x - 0.5) * 25; 
        const targetY = -(wrist.y - 0.5) * 20 + 2; 
        
        targetPos = { x: targetX, y: targetY, z: rawZ, hasData: true };
        
        // Hand Skeleton Visuals
        const normalizedDepth = Math.max(0, Math.min(1, (handSize - 0.05) * 4));
        const color = `hsl(${(1 - normalizedDepth) * 240}, 100%, 50%)`;
        
        window.drawConnectors(outputCtx, landmarks, window.HAND_CONNECTIONS, { color: '#fff', lineWidth: 2 });
        window.drawLandmarks(outputCtx, landmarks, { color: color, lineWidth: 1, radius: 7 });

        // Position info div below hand (inverted horizontally to match mirrored feed)
        const canvasRect = outputCanvas.getBoundingClientRect();
        const handScreenX = (1 - wrist.x) * canvasRect.width + canvasRect.left; // Inverted X
        const handScreenY = wrist.y * canvasRect.height + canvasRect.top;
        
        infoDiv.style.display = 'block';
        infoDiv.style.left = handScreenX + 'px';
        infoDiv.style.top = (handScreenY + 40) + 'px';
        infoDiv.style.transform = 'translateX(-50%)';

        handXSpan.textContent = targetPos.x.toFixed(1);
        handYSpan.textContent = targetPos.y.toFixed(1);
        handZSpan.textContent = targetPos.z.toFixed(1);
      } else {
        targetPos.hasData = false;
        infoDiv.style.display = 'none';
      }
      outputCtx.restore();
    });

    // --- ANIMATION LOOP ---
    function animate() {
      requestAnimationFrame(animate);

      // FPS calculation
      frameCount++;
      const currentTime = performance.now();
      if (currentTime >= lastFrameTime + 1000) {
        fps = Math.round((frameCount * 1000) / (currentTime - lastFrameTime));
        fpsValueSpan.textContent = fps;
        frameCount = 0;
        lastFrameTime = currentTime;
      }

      if (targetPos.hasData) {
        smoothedX += (targetPos.x - smoothedX) * smoothFactor;
        smoothedY += (targetPos.y - smoothedY) * smoothFactor;
        smoothedZ += (targetPos.z - smoothedZ) * smoothFactor;

        arObject.position.set(smoothedX, smoothedY, smoothedZ);
        arObject.rotation.x += 0.01;
        arObject.rotation.y += 0.015;
      } else {
        arObject.rotation.y += 0.01;
      }

      renderer.render(scene, camera);
    }

    // --- CAMERA INIT ---
    if (typeof window.Camera === 'undefined') {
      console.error("Camera library failed to load.");
    } else {
      const cameraObj = new window.Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1920,
        height: 1080
      });
      
      cameraObj.start().then(() => {
        console.log("Camera started successfully");
        animate();
      });
    }
  </script>
</body>
</html>
