<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Kitten Defense</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Primary Meta Tags -->
    <meta name="title" content="Laser Kitten Defense">
    <meta name="description" content="use eye lasers to protect kittens">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://funwithcomputervision.com/laser-kitten/">
    <meta property="og:title" content="Laser Kitten Defense">
    <meta property="og:description" content="use eye lasers to protect kittens">
    <meta property="og:image" content="https://funwithcomputervision.com/assets/laser-kitten.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://funwithcomputervision.com/laser-kitten/">
    <meta property="twitter:title" content="Laser Kitten Defense">
    <meta property="twitter:description" content="use eye lasers to protect kittens">
    <meta property="twitter:image" content="https://funwithcomputervision.com/assets/laser-kitten.png">

    <script defer src="https://cloud.umami.is/script.js" data-website-id="376d8af4-cd09-461a-9ca9-f5eeed83e857"></script>

</head>
<body>
    <div id="gameContainer">
        <video id="videoElement" autoplay muted playsinline></video>
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <p>Ghosts Defeated: <span id="score">0</span></p>
        </div>
        <div id="leftEye" class="eye-glow" style="display: none;"></div>
        <div id="rightEye" class="eye-glow" style="display: none;"></div>
        <div id="start-overlay">
            <p>Defend your kittens</p>
            <br>
            <p>Move your head to blast ghosts</p>
            <button id="startButton">📡 Go 🐈</button>
        </div>
        <div id="gameOverScreen">
            <p>All kittens were captured</p>
            <p>You defeated <span id="finalScore">0</span> ghosts</p>
            <button onclick="location.reload()">Play Again</button>
            <br>
            <a href="https://www.funwithcomputervision.com/" target="_blank">code & tutorials</a> | 
            <a href="https://x.com/measure_plan" target="_blank">twitter</a> | 
            <a href="https://www.youtube.com/@funwithcomputervision" target="_blank">youtube</a>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"></script>
    <script src="sound.js"></script>

</body>
</html>
